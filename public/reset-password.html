<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password - Smart Key</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      margin: 20px;
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo-icon {
      background: #1a3c8f;
      width: 70px;
      height: 70px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      font-size: 32px;
    }

    .logo h1 { font-size: 24px; color: #1a3c8f; font-weight: 700; }
    .logo p { color: #666; font-size: 14px; margin-top: 4px; }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    input {
      width: 100%;
      padding: 12px 44px 12px 14px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      font-size: 14px;
      background: #f9f9f9;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #1a3c8f; background: #fff; }

    .eye-btn {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      transition: color 0.2s;
    }

    .eye-btn:hover { color: #1a3c8f; }

    .eye-btn svg {
      width: 20px;
      height: 20px;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: #1a3c8f;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .message {
      text-align: center;
      padding: 12px;
      border-radius: 10px;
      font-size: 14px;
      margin-top: 16px;
      display: none;
    }

    .message.success { background: #e8f8ef; color: #1f9d55; display: block; }
    .message.error { background: #fdecea; color: #d93025; display: block; }

    .success-box { text-align: center; display: none; }
    .success-box .check { font-size: 60px; margin-bottom: 16px; }
    .success-box h2 { color: #1a3c8f; margin-bottom: 8px; }
    .success-box p { color: #666; font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🔑</div>
      <h1>Smart Key</h1>
      <p>Enter your new password below</p>
    </div>

    <!-- Reset Form -->
    <div id="resetForm">
      <div class="form-group">
        <label>New Password</label>
        <div class="input-wrapper">
          <input type="password" id="newPassword" placeholder="Enter new password" />
          <button class="eye-btn" onclick="togglePassword('newPassword', this)" id="eyeBtn1">
            <!-- Eye open SVG -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <div class="input-wrapper">
          <input type="password" id="confirmPassword" placeholder="Confirm new password" />
          <button class="eye-btn" onclick="togglePassword('confirmPassword', this)" id="eyeBtn2">
            <!-- Eye open SVG -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
            </svg>
          </button>
        </div>
      </div>

      <button class="btn" id="submitBtn" onclick="resetPassword()">
        Reset Password
      </button>

      <div class="message" id="message"></div>
    </div>

    <!-- Success Box -->
    <div class="success-box" id="successBox">
      <div class="check">✅</div>
      <h2>Password Reset!</h2>
      <p>Your password has been changed successfully.<br/>You can now log in to Smart Key with your new password.</p>
    </div>
  </div>

  <script>
    // SVG icons
    const eyeOpenSVG = `
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
      </svg>`;

    const eyeClosedSVG = `
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
      </svg>`;

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        btn.innerHTML = eyeClosedSVG;
      } else {
        input.type = 'password';
        btn.innerHTML = eyeOpenSVG;
      }
    }

    function getToken() {
      const params = new URLSearchParams(window.location.search);
      return params.get('token');
    }

    async function resetPassword() {
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const messageEl = document.getElementById('message');
      const submitBtn = document.getElementById('submitBtn');

      messageEl.className = 'message';
      messageEl.textContent = '';

      if (!newPassword || !confirmPassword) {
        messageEl.className = 'message error';
        messageEl.textContent = 'Please fill in both fields.';
        return;
      }

      if (newPassword.length < 6) {
        messageEl.className = 'message error';
        messageEl.textContent = 'Password must be at least 6 characters.';
        return;
      }

      if (newPassword !== confirmPassword) {
        messageEl.className = 'message error';
        messageEl.textContent = 'Passwords do not match.';
        return;
      }

      const token = getToken();
      if (!token) {
        messageEl.className = 'message error';
        messageEl.textContent = 'Invalid or missing reset token.';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Resetting...';

      try {
        const response = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword }),
        });

        const data = await response.json();

        if (response.ok) {
          document.getElementById('resetForm').style.display = 'none';
          document.getElementById('successBox').style.display = 'block';
        } else {
          messageEl.className = 'message error';
          messageEl.textContent = data.error || 'Failed to reset password.';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Reset Password';
        }
      } catch (err) {
        messageEl.className = 'message error';
        messageEl.textContent = 'Something went wrong. Please try again.';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Reset Password';
      }
    }
  </script>
</body>
</html>
